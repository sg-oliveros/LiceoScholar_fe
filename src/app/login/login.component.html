<section>
    <h1>Login</h1>
</section>

<app-login-form
  [email]="email()"
  [password]="password()"
  (onsubmit)="handleSubmitClicked()"
/>

<section class="posts">
    <article class="post">
    @for (post of posts(); track post.id) {
    <h2>{{ post.title }}</h2>
    <p>{{ post.body }}</p>
    }
    </article>
</section>
