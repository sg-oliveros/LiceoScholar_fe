<form class="login-form"  >
  <input
    type="email"
    id="email"
    name="email"
    placeholder="School Email (e.g. name@liceo.edu.ph)"
    [(ngModel)]="email"
    pattern=".*@liceo\.edu\.ph$"
    title="Email must be in the format: name@liceo.edu.ph"
    required
  />
  <input
    type="password"
    id="password"
    name="password"
    placeholder="Password"
    [(ngModel)]="password"
  />
  <button type="button" class="forgotpassword" (click)="onforget.emit()">Forgot password?</button>
  
  <button type="submit" [disabled]="disabled()" (click)="onsubmitClicked()">
    Login
  </button>
</form>
