<form class="login-form">
  <input
    type="email"
    id="email"
    name="email"
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    id="password"
    name="password"
    placeholder="Password"
    [(ngModel)]="password"
  />
  <button class="forgotpassword" (click)="onforget.emit()">Forgot password?</button>
  
  <button type="submit" [disabled]="disabled()" (click)="onsubmitClicked()">
    Login
  </button>
</form>
