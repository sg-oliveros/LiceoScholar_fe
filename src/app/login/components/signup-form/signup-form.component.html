<form class="signup-form">
  <input type="text" 
  id="schoolID"
  name="schoolID"
  placeholder="Liceo School ID" 
  [(ngModel)]="schoolID"
  />

  <input
    type="text"
    id="firstName"
    name="firstName"
    [(ngModel)]="firstName"
    placeholder="First Name"
  />

  <input
    type="text"
    id="lastName"
    name="lastName"
    [(ngModel)]="lastName"
    placeholder="Last Name"
  />

  <input
    type="text"
    id="phoneNumber"
    name="phoneNumber"
    [(ngModel)]="phoneNumber"
    placeholder="Phone Number"
  />

  <select name="course" [(ngModel)]="course" required>
    <option value="" disabled selected hidden >Course Name</option>
    
    @for (c of courses; track c.id) {
      <option [value]="c.id">
        {{ c.name }}
      </option>
    }
  </select>

  <input
    type="email"
    id="schoolEmail"
    name="schoolEmail"
    [(ngModel)]="schoolEmail"
    placeholder="School Email (e.g. name@liceo.edu.ph)"
    pattern=".*@liceo\.edu\.ph$"
    title="Email must be in the format: name@liceo.edu.ph"
    required
  />

  <input
    type="password"
    id="password"
    name="password"
    [(ngModel)]="password"
    placeholder="Password"
  />


  <button type="submit" [disabled]="disabled()" (click)="onsubmitClicked()">
    Sign Up
  </button>
</form>
