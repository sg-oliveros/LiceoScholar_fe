<div class="container">
  <app-user-sidebar></app-user-sidebar>

  <div class="content">

    <div class="profile-section">
      <app-profile-photo [editable]="true"></app-profile-photo>

      <div class="info">
        <label>Last Name, First Name, M.I.</label>
        <input [value]="student().fullName" disabled />

        <label>Email</label>
        <input [value]="student().email" disabled />

        <label>Phone Number</label>
        <input [value]="student().phone" disabled />

        <label>Course</label>
        <input [value]="student().course" disabled />

        <button class="edit-info-btn" (click)="openEditInfo()">Edit info</button>
      </div>
      
    </div>

    <div class="apply-row">
      <button class="apply-btn" (click)="openApplyModal()">Apply</button>
    </div>

    <div>
      <div class="history-table">
        <div class="table-head">
          <span>ApplicationID</span>
          <span>Scholarship Name</span>
          <span>Status</span>
          <span>Date Submitted</span>
        </div>
        <div class="history-table-wrapper">
          <div class="table-row" *ngFor="let record of applications()">
            <span>{{ record.ApplicationID }}</span>
            <span>{{ record.ScholarshipType }}</span>
            <span [ngClass]="record.Status.toLowerCase()">{{ record.Status }}</span>
            <span>{{ record.Application_Date }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- EDIT INFO MODAL -->
<div class="modal-overlay" *ngIf="showEditInfo" (click)="closeEditInfo()">
  <div class="modal edit-modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeEditInfo()">&#x2715;</button>

    <div class="modal-body">
      <h3>Edit Profile Information</h3>

      <label class="edit-modal-lable">Last Name</label>
      <input type="text" [(ngModel)]="editLastName" name="editLastName" class="edit-modal-input" />

      <label class="edit-modal-lable">First Name</label>
      <input type="text" [(ngModel)]="editFirstName" name="editFirstName" class="edit-modal-input" />

      <label class="edit-modal-lable">Email</label>
      <input type="email" [(ngModel)]="editEmail" name="editEmail" class="edit-modal-input" />

      <label class="edit-modal-lable">Phone Number</label>
      <input type="text" [(ngModel)]="editPhone" name="editPhone" class="edit-modal-input" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeEditInfo()">Cancel</button>
      <button class="btn-apply" (click)="saveInfo()">Save</button>
    </div>
  </div>
</div>

<!-- APPLY MODAL -->
<div class="modal-overlay" *ngIf="showApplyModal" (click)="closeApplyModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeApplyModal()">&#x2715;</button>

    <div class="edit-modal-body">
      <label class="modal-label">
        Scholarship Type <span class="required">*</span>
      </label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedScholarship">
          <option value="" disabled selected></option>
          <option value="Academic Scholarship (FULL)">Academic Scholarship (FULL)</option>
          <option value="Academic Scholarship (Half)">Academic Scholarship (Half)</option>
          <option value="Non-Academic Scholarship">Non-Academic Scholarship</option>
          <option value="Special Scholarship">Special Scholarship</option>
        </select>
        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeApplyModal()">Cancel</button>
      <button class="btn-apply" (click)="submitApplication(); closeApplyModal()" [disabled]="!selectedScholarship">APPLY</button>
    </div>
  </div>
</div>
