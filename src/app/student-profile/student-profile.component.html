<div class="container">
  <app-user-sidebar></app-user-sidebar>

  <div class="content">

    <div class="profile-section">
      <div class="profile-img-wrapper">
        <img [src]="student.profileImage" alt="Profile" class="profile-img" />
        <button class="edit-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>

      <div class="info">
        <label>Last Name, First Name, M.I.</label>
        <input [value]="student.fullName" disabled />

        <label>Course</label>
        <input [value]="student.course" disabled />

        <label>Year Level</label>
        <input [value]="student.yearLevel" disabled />

        <label>Age</label>
        <input [value]="student.age" disabled />

        <label>Sex</label>
        <input [value]="student.sex" disabled />

        <label>Scholarship Type</label>
        <input [value]="student.scholarshipType" disabled />
      </div>
    </div>

    <div class="apply-row">
      <button class="apply-btn" (click)="openModal()">Apply</button>
    </div>

    <div class="history-table">
      <div class="table-head">
        <span>ApplicationID</span>
        <span>Scholarship Name</span>
        <span>Status</span>
        <span>Date Submitted</span>
      </div>
      <div class="table-row" *ngFor="let record of student.history">
        <span>{{ record.applicationId }}</span>
        <span>{{ record.scholarshipName }}</span>
        <span [ngClass]="record.status.toLowerCase()">{{ record.status }}</span>
        <span>{{ record.dateSubmitted }}</span>
      </div>
    </div>

  </div>
</div>

<!-- APPLY MODAL -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeModal()">&#x2715;</button>

    <div class="modal-body">
      <label class="modal-label">
        Scholarship Type <span class="required">*</span>
      </label>
      <div class="select-wrapper">
        <select [(ngModel)]="selectedScholarship">
          <option value="" disabled selected></option>
          <option value="Academic Scholarship (FULL)">Academic Scholarship (FULL)</option>
          <option value="Academic Scholarship (Half)">Academic Scholarship (Half)</option>
          <option value="Non-Academic Scholarship">Non-Academic Scholarship</option>
          <option value="Special Scholarship">Special Scholarship</option>
        </select>
        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-apply" (click)="submitApplication()" [disabled]="!selectedScholarship">APPLY</button>
    </div>
  </div>
</div>
